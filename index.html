                                <a href="https://www.linkedin.com/in/sagar-lal007" target="_blank" rel="noopener noreferrer" className="w-12 h-12 rounded-full dark:bg-slate-800 bg-white dark:text-slate-300 text-slate-600 hover:text-primary dark:hover:text-primary hover:-translate-y-1 transition-all flex items-center justify-center text-xl shadow-sm border dark:border-slate-700 border-slate-200"><i className="fab fa-linkedin"></i></a>
                                <a href="mailto:Sagarrangwani1@gmail.com" className="w-12 h-12 rounded-full dark:bg-slate-800 bg-white dark:text-slate-300 text-slate-600 hover:text-primary dark:hover:text-primary hover:-translate-y-1 transition-all flex items-center justify-center text-xl shadow-sm border dark:border-slate-700 border-slate-200"><i className="fas fa-envelope"></i></a>

        root.render(<App />);
